<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>С 8 Марта!</title>
    <style>
        /* Подключаем красивые шрифты */
        @import url('https://fonts.googleapis.com');

        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #fff5f6 0%, #febed5 100%);
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
        }

        .card {
            position: relative;
            width: 380px;
            background: white;
            border-radius: 30px;
            box-shadow: 0 20px 60px rgba(216, 27, 96, 0.2);
            text-align: center;
            padding: 50px 30px;
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-10px);
        }

        /* Та самая анимированная восьмерка */
        .number-8 {
            font-family: 'Playfair Display', serif;
            font-size: 160px;
            font-weight: 900;
            line-height: 1;
            margin: 0;
            background: linear-gradient(45deg, #ff4081, #d81b60, #ad1457);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(4px 8px 10px rgba(0,0,0,0.1));
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); filter: brightness(1); }
            50% { transform: scale(1.08); filter: brightness(1.2); }
        }

        h1 {
            font-family: 'Great Vibes', cursive;
            font-size: 55px;
            color: #d81b60;
            margin: 10px 0;
            font-weight: normal;
        }

        p {
            color: #880e4f;
            font-size: 1.1em;
            line-height: 1.6;
            margin-top: 20px;
        }

        /* Декоративные цветы по бокам (CSS-анимация) */
        .flower-decor {
            position: absolute;
            font-size: 40px;
            animation: sway 3s ease-in-out infinite alternate;
        }

        .f1 { top: 20px; left: 20px; }
        .f2 { bottom: 20px; right: 20px; animation-delay: 1s; }

        @keyframes sway {
            from { transform: rotate(-15deg); }
            to { transform: rotate(15deg); }
        }

        .footer-sparkle {
            margin-top: 25px;
            color: #ff4081;
            font-weight: bold;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="flower-decor f1">🌸</div>
        <div class="flower-decor f2">🌷</div>

        <div class="number-8">8</div>
        <h1>Марта</h1>
        
        <p>Пусть весна расцветает в душе, <br> а каждый день дарит <br> повод для улыбки!</p>
        
        <div class="footer-sparkle">✨ С ПРАЗДНИКОМ ✨</div>
    </div>

</body>
</html>
